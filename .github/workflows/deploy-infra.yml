name: Deploy Infrastructure

# ─── Triggers ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options: [dev, staging, prod]

# ─── Permissions (OIDC login – no long-lived secrets) ─────────────────────────
permissions:
  id-token: write
  contents: read

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  deploy-infra:
    name: Bicep deployment
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Azure login via OIDC ───────────────────────────────────────────────
      # Required secrets (set at repo or environment level):
      #   AZURE_CLIENT_ID       – service principal / app registration client ID
      #   AZURE_TENANT_ID       – Azure AD tenant ID
      #   AZURE_SUBSCRIPTION_ID – target subscription
      # Required variables:
      #   AZURE_RESOURCE_GROUP  – resource group name  (e.g. rg-video2doc-ai)
      #   AZURE_LOCATION        – primary region        (e.g. eastus)
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── 3. Create resource group ──────────────────────────────────────────────
      - name: Create Resource Group
        run: |
          az group create \
            --name     "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}"

      # ── 4. Deploy Bicep template ──────────────────────────────────────────────
      - name: Deploy Bicep
        id: bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP }}
          template:          ./infra/main.bicep
          parameters: >
            environmentName=${{ github.event.inputs.environment || 'dev' }}
            location=${{ vars.AZURE_LOCATION }}
            namePrefix=${{ vars.NAME_PREFIX || 'v2doc' }}
          deploymentName: video2doc-ai-${{ github.run_number }}
          failOnStdErr: false

      # ── 5. Print outputs ──────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "### Deployment outputs" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource       | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| API URL        | ${{ steps.bicep.outputs.apiUrl }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| UI URL         | ${{ steps.bicep.outputs.uiUrl }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ACR Server     | ${{ steps.bicep.outputs.acrLoginServer }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Container App  | ${{ steps.bicep.outputs.containerAppName }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key Vault      | ${{ steps.bicep.outputs.keyVaultName }} |" >> "$GITHUB_STEP_SUMMARY"
